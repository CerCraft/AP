<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Панель управления</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(ellipse at top, #1a0b2e 0%, #0a0015 60%, #000 100%);
    color: #fff;
    min-height: 100vh;
    padding: 30px 20px 60px;
}
.wrap { max-width: 720px; margin: 0 auto; }
h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #a78bfa, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.subtitle {
    text-align: center;
    color: #8b7ba8;
    font-size: 13px;
    margin-bottom: 30px;
}
.section {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
    transition: border-color 0.3s;
}
.section:hover { border-color: rgba(139,92,246,0.25); }
.section h2 {
    margin-bottom: 16px;
    color: #c4b5fd;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
}
.section h2 i { color: #a78bfa; }

/* Поля ввода */
input, textarea, select {
    width: 100%;
    padding: 11px 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    margin-bottom: 10px;
    font-family: inherit;
    transition: all 0.2s;
}
input::placeholder, textarea::placeholder { color: #6b5b85; }
input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #8b5cf6;
    background: rgba(0,0,0,0.5);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.15);
}
textarea { resize: vertical; min-height: 70px; }

/* Select — стилизованный под тёмную тему */
select {
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%23a78bfa' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    padding-right: 38px;
    cursor: pointer;
}
select option {
    background: #1a0b2e;
    color: #fff;
    padding: 10px;
}

/* Кнопки */
button {
    padding: 11px 20px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
}
button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139,92,246,0.35); }
button:active { transform: translateY(0); }
button.danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }
button.danger:hover { box-shadow: 0 8px 20px rgba(239,68,68,0.35); }
button.small { padding: 7px 12px; font-size: 12px; }
button.ghost {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
}
button.ghost:hover { background: rgba(255,255,255,0.1); box-shadow: none; }

/* File input */
.file-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(139,92,246,0.15);
    border: 1px dashed rgba(139,92,246,0.4);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    color: #c4b5fd;
}
.file-label:hover { background: rgba(139,92,246,0.25); border-color: #8b5cf6; }
.file-label input { display: none; }

/* Элемент списка */
.item {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}
.item input { margin: 0; flex: 1; min-width: 140px; }
.item .icon-preview {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(139,92,246,0.15);
    border-radius: 8px;
    font-size: 18px;
    flex-shrink: 0;
}

/* Сетка иконок */
.icon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
    gap: 8px;
    margin-bottom: 14px;
    max-height: 280px;
    overflow-y: auto;
    padding: 4px;
}
.icon-grid::-webkit-scrollbar { width: 6px; }
.icon-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 3px; }
.icon-grid::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 3px; }
.icon-btn {
    padding: 12px 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    font-size: 22px;
    transition: all 0.2s;
    color: #fff;
}
.icon-btn:hover { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.5); transform: translateY(-2px); }
.icon-btn.active {
    background: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(236,72,153,0.25));
    border-color: #8b5cf6;
    box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
}
.icon-btn span { display: block; font-size: 10px; margin-top: 5px; color: #a78bfa; }

/* Превью */
.preview {
    max-width: 110px;
    max-height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(139,92,246,0.4);
    margin-top: 12px;
}
.preview-video {
    max-width: 100%;
    max-height: 180px;
    border-radius: 10px;
    margin-top: 12px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* Статус */
.toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(16,185,129,0.4);
    transform: translateX(400px);
    transition: transform 0.3s;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
}
.toast.show { transform: translateX(0); }

/* Deploy блок */
.deploy {
    background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1));
    border: 1px solid rgba(59,130,246,0.25);
    text-align: center;
}
.deploy h2 { justify-content: center; }
.deploy code {
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    color: #c4b5fd;
    font-size: 13px;
}
.deploy p { color: #a78bfa; font-size: 14px; line-height: 1.6; }

.label {
    display: block;
    color: #a78bfa;
    font-size: 12px;
    margin-bottom: 6px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="wrap">
    <h1><i class="fas fa-wand-magic-sparkles"></i> Панель управления</h1>
    <p class="subtitle">Все изменения сохраняются автоматически</p>

    <div class="toast" id="toast"><i class="fas fa-check"></i> Сохранено</div>

    <div class="section">
        <h2><i class="fas fa-user-circle"></i> Профиль</h2>
        <label class="label">Имя / Ник</label>
        <input id="name" placeholder="Например: Алекс">
        <label class="label">Подзаголовок</label>
        <input id="tagline" placeholder="@username или что-то ещё">
        <label class="label">Описание / цитата</label>
        <textarea id="bio" rows="3" placeholder="Расскажи о себе..."></textarea>
        <label class="label">Аватарка</label>
        <label class="file-label">
            <i class="fas fa-cloud-arrow-up"></i> Выбрать картинку
            <input type="file" id="avatarFile" accept="image/*">
        </label>
        <img id="avatarPreview" class="preview" style="display:none;">
    </div>

    <div class="section">
        <h2><i class="fas fa-film"></i> Видео на фон</h2>
        <label class="file-label">
            <i class="fas fa-cloud-arrow-up"></i> Выбрать видео
            <input type="file" id="videoFile" accept="video/*">
        </label>
        <video id="videoPreview" class="preview-video" style="display:none;" muted loop autoplay></video>
        <p id="videoInfo" style="margin-top:10px;color:#8b7ba8;font-size:13px;"></p>
        <button class="danger small" onclick="removeVideo()" style="margin-top:8px;">
            <i class="fas fa-trash"></i> Убрать видео
        </button>
    </div>

    <div class="section">
        <h2><i class="fas fa-music"></i> Музыка</h2>
        <label class="file-label">
            <i class="fas fa-cloud-arrow-up"></i> Добавить треки
            <input type="file" id="musicFile" accept="audio/*" multiple>
        </label>
        <div id="tracksList" style="margin-top:14px;"></div>
    </div>

    <div class="section">
        <h2><i class="fas fa-link"></i> Ссылки</h2>
        <label class="label">Выбери тип (название подставится, но можно изменить)</label>
        <div class="icon-grid" id="iconGrid"></div>
        <label class="label">Название</label>
        <input id="linkTitle" placeholder="Telegram, YouTube...">
        <label class="label">Ссылка</label>
        <input id="linkUrl" placeholder="https://...">
        <button onclick="addLink()"><i class="fas fa-plus"></i> Добавить</button>
        <div id="linksList" style="margin-top:16px;"></div>
    </div>

    <div class="section deploy">
        <h2><i class="fas fa-rocket"></i> Выложить в интернет</h2>
        <p>Чтобы получить бесплатную ссылку — запусти файл<br><code>deploy.bat</code> в папке проекта.</p>
    </div>
</div>

<script src="panel.js"></script>
</body>
</html>
